<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ubox Solutions Load Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

   body{
    background:#f4f6f9;
    padding:10px;
    overflow-x:auto;
}

    .container{
        max-width:1200px;
        margin:auto;
        background:white;
        padding:20px;
        border-radius:12px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
        color:#1e3a8a;
    }
    h3{
      text-align: center;
      margin-bottom: 30px;
      color:#1e3a8a;
    }
    
    .week-section{
    display:flex;
    gap:20px;
    justify-content:center;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.week-box{
    background:#eef2ff;
    padding:15px;
    border-radius:10px;
    min-width:220px;
}

.week-box label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#1e3a8a;
}

    .form-grid{
        display:grid;
        grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
        gap:15px;
        margin-bottom:20px;
    }
    label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
    color:#1e3a8a;
    font-weight:bold;
}

    input{
        padding:10px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:15px;
    }

    button{
        padding:12px;
        border:none;
        border-radius:8px;
        background:#2563eb;
        color:white;
        cursor:pointer;
        font-size:16px;
        transition:0.3s;
    }

    button:hover{
        background:#1d4ed8;
    }

    table{
    width:100%;
    min-width:1100px;
    border-collapse:collapse;
    margin-top:20px;
}
    .table-wrapper{
    width:100%;
    overflow-x:auto;
}

    th, td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
    white-space:nowrap;
}

    th{
        background:#2563eb;
        color:white;
    }

    .summary{
        margin-top:25px;
        background:#eef2ff;
        padding:20px;
        border-radius:10px;
    }

    .summary h2{
        margin-bottom:10px;
        color:#1e3a8a;
    }

    .delete-btn{
        background:#dc2626;
        padding:8px 12px;
    }

    .delete-btn:hover{
        background:#b91c1c;
    }

    .export-btn{
        margin-top:15px;
        background:#059669;
    }

    .export-btn:hover{
        background:#047857;
    }

    @media(max-width:700px){
        table{
            font-size:12px;
        }
    }
    @media print {
    button {
        display:none;
    }

    body{
        background:white;
    }

    .container{
        box-shadow:none;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>Ubox Solutions Load Tracker</h1>
    <h3>Universe Carrier Inc</h3>

<div class="week-section">

    <div class="week-box">
        <label>Week Start (Monday)</label>
        <input type="date" id="weekStart">
    </div>

    <div class="week-box">
        <label>Week End (Next Monday)</label>
        <input type="date" id="weekEnd">
    </div>

</div>


<div class="form-grid">

    <input type="text" id="loadNumber" placeholder="Load Number">

    <input type="text" id="refordry" placeholder="REF or DRY">

    <input type="text" id="pickup" placeholder="Pickup City">

    <div>
        <label>Pickup Date</label>
        <input type="date" id="pickupDate">
    </div>

    <div>
        <label>Pickup Time</label>
        <input type="time" id="pickupTime">
    </div>

    <input type="text" id="delivery" placeholder="Delivery City">

    <div>
        <label>Delivery Date</label>
        <input type="date" id="deliveryDate">
    </div>

    <div>
        <label>Delivery Time</label>
        <input type="time" id="deliveryTime">
    </div>

    <input type="number" id="miles" placeholder="Miles">

    <input type="number" id="detentionHours" placeholder="Detention Hours">

    <button onclick="addLoad()">Add Load</button>

</div>
  <div class="table-wrapper">
    <table>
        <thead>
    <tr>
        <th>Load #</th>
        <th>REF/DRY</th>
        <th>Pickup</th>
        <th>Pickup Date</th>
        <th>Pickup Time</th>
        <th>Delivery</th>
        <th>Delivery Date</th>
        <th>Delivery Time</th>
        <th>Miles</th>
        <th>Detention</th>
        <th>Delete</th>
    </tr>
</thead>

        <tbody id="tableBody"></tbody>
    </table>
    </div>
  

    <div class="summary">

    <h2>Weekly Summary</h2>

    <p>
        <strong>Total Miles:</strong>
        <span id="totalMiles">0</span>
    </p>

    <p>
        <strong>Total Detention Hours:</strong>
        <span id="totalDetentionHours">0</span>
    </p>

    <button class="export-btn" onclick="window.print()">
        Print / Save PDF
    </button>

</div>

</div>

<script>

const RATE_PER_MILE = 0.75;
const DETENTION_RATE = 15;

let loads = JSON.parse(localStorage.getItem("loads")) || [];

renderTable();

function addLoad(){

    const loadNumber = document.getElementById("loadNumber").value;

    const refordry = document.getElementById("refordry").value;

    const pickup = document.getElementById("pickup").value;

    const pickupDate = document.getElementById("pickupDate").value;

    const pickupTime = document.getElementById("pickupTime").value;

    const delivery = document.getElementById("delivery").value;

    const deliveryDate = document.getElementById("deliveryDate").value;

    const deliveryTime = document.getElementById("deliveryTime").value;

    const miles = parseFloat(document.getElementById("miles").value) || 0;

    const detentionHours = parseFloat(document.getElementById("detentionHours").value) || 0;

    const milesPay = miles * RATE_PER_MILE;

    const detentionPay = detentionHours * DETENTION_RATE;

    const total = milesPay + detentionPay;

    const load = {

        loadNumber,

        refordry,

        pickup,

        pickupDate,

        pickupTime,

        delivery,

        deliveryDate,

        deliveryTime,

        miles,

        milesPay,

        detentionHours,

        detentionPay,

        total
    };

    loads.push(load);

    localStorage.setItem("loads", JSON.stringify(loads));

    clearInputs();

    renderTable();
}

function renderTable(){

    const tableBody = document.getElementById("tableBody");

    tableBody.innerHTML = "";

    let totalMiles = 0;
    let totalDetentionHours = 0;

    loads.forEach((load,index)=>{
      
           totalMiles += load.miles;
       totalDetentionHours += load.detentionHours;

        tableBody.innerHTML += `
<tr>
    <td>${load.loadNumber}</td>
    <td>${load.refordry}</td>
    <td>${load.pickup}</td>
    <td>${load.pickupDate}</td>
    <td>${load.pickupTime}</td>
    <td>${load.delivery}</td>
    <td>${load.deliveryDate}</td>
    <td>${load.deliveryTime}</td>
    <td>${load.miles}</td>
    <td>${load.detentionHours} hr</td>
    <td>
        <button class="delete-btn" onclick="deleteLoad(${index})">
            Delete
        </button>
    </td>
</tr>
`;
    });

    document.getElementById("totalMiles").innerText = totalMiles;
   document.getElementById("totalDetentionHours").innerText = totalDetentionHours;
}

function deleteLoad(index){

    loads.splice(index,1);

    localStorage.setItem("loads", JSON.stringify(loads));

    renderTable();
}

function clearInputs(){

    document.getElementById("loadNumber").value = "";

    document.getElementById("refordry").value = "";

    document.getElementById("pickup").value = "";

    document.getElementById("pickupDate").value = "";

    document.getElementById("pickupTime").value = "";

    document.getElementById("delivery").value = "";

    document.getElementById("deliveryDate").value = "";

    document.getElementById("deliveryTime").value = "";

    document.getElementById("miles").value = "";

    document.getElementById("detentionHours").value = "";
}

const weekStart = document.getElementById("weekStart");
const weekEnd = document.getElementById("weekEnd");

weekStart.value = localStorage.getItem("weekStart") || "";
weekEnd.value = localStorage.getItem("weekEnd") || "";

weekStart.addEventListener("change", () => {
    localStorage.setItem("weekStart", weekStart.value);
});

weekEnd.addEventListener("change", () => {
    localStorage.setItem("weekEnd", weekEnd.value);
});

</script>

<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("service-worker.js")
    .then(() => {
        console.log("Service Worker Registered");
    });

}

</script>
</body>
</html>
